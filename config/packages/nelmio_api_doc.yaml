nelmio_api_doc:
    documentation:
        openapi: 3.0.0
        info:
            title: Video processor API
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
            security:
                -   Bearer: [ ]
    areas:
        path_patterns: # an array of regexps (document only routes under /api, except /api/doc)
            - ^/api(?!/doc$)

